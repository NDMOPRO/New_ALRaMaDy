<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        .slide-container { width: 1280px; min-height: 720px; background: white; position: relative; display: flex; flex-direction: column; }
        .top-accent { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(to left, #00B388, #2B5EA7, #E8A838); z-index: 10; }
        .header-bar { width: 100%; height: 64px; background: linear-gradient(90deg, #1B2A4A 0%, #243656 100%); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; color: white; flex-shrink: 0; }
        .header-title { font-size: 28px; font-weight: 700; }
        .header-badge { width: 40px; height: 40px; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }

        .content-area { padding: 40px; flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .bg-pattern { position: absolute; width: 100%; height: 100%; opacity: 0.03; background-image: radial-gradient(#1B2A4A 1px, transparent 1px); background-size: 20px 20px; z-index: 0; }
        
        .section-container { text-align: center; z-index: 1; position: relative; border: 2px solid #2B5EA7; padding: 60px 100px; border-radius: 8px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .sc-icon { font-size: 64px; color: #2B5EA7; margin-bottom: 24px; }
        .sc-title { font-size: 48px; font-weight: 800; color: #1B2A4A; margin-bottom: 16px; letter-spacing: -1px; }
        .sc-subtitle { font-size: 20px; color: #666; font-weight: 500; }
        
        .sc-line { width: 60px; height: 4px; background: #00B388; margin: 24px auto; border-radius: 2px; }

        .footer { position: absolute; bottom: 18px; left: 40px; display: flex; align-items: center; gap: 12px; }
        .logo-box { background: rgba(255,255,255,0.92); padding: 4px 8px; display: flex; align-items: center; }
        .logo-box img { height: 28px; }
        .sep { width: 1px; height: 22px; background: #ccc; }
        .page-num { position: absolute; bottom: 18px; right: 40px; font-weight: 700; color: #1B2A4A; font-size: 14px; opacity: 0.4; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="top-accent"></div>
        <div class="header-bar">
            <div class="header-title">القسم الخامس</div>
            <div class="header-badge">55</div>
        </div>

        <div class="content-area">
            <div class="bg-pattern"></div>
            
            <div class="section-container">
                <i class="fas fa-folder-open sc-icon"></i>
                <div class="sc-title">الملاحق والمصادر</div>
                <div class="sc-line"></div>
                <div class="sc-subtitle">الوثائق الداعمة، النماذج، وقاموس المصطلحات</div>
            </div>
        </div>

        <div class="footer">
            <div class="logo-box"><img src="/home/ubuntu/ndmo_ref_v5/assets/ndmo_logo.png" alt="NDMO"></div>
            <div class="sep"></div>
            <div class="logo-box"><img src="/home/ubuntu/ndmo_ref_v5/assets/sdaia_logo.png" alt="SDAIA"></div>
        </div>
        <div class="page-num">55</div>
    </div>
</body>
</html>
