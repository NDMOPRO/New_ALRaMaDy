<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شريحة الختام</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1B2A4A; /* Royal Dark Blue */
            --accent-color: #00B388; /* Teal */
            --highlight-color: #E8A838; /* Gold */
            --white: #FFFFFF;
            --light-bg: #F8F9FA;
            --border-color: #E0E0E0;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #0d1626 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Decorative Elements */
        .deco-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.05;
            background: white;
        }

        .c1 { width: 600px; height: 600px; top: -200px; right: -200px; }
        .c2 { width: 400px; height: 400px; bottom: -100px; left: -100px; }
        
        .deco-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--highlight-color), transparent);
            width: 80%;
            opacity: 0.3;
        }

        /* Content */
        .content-wrapper {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .logo-container {
            background-color: rgba(255,255,255,0.1);
            padding: 20px 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo-img {
            height: 60px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .thank-you-text {
            font-size: 64px;
            font-weight: 800;
            color: var(--white);
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 24px;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
            max-width: 600px;
            line-height: 1.6;
        }

        .contact-info {
            margin-top: 40px;
            display: flex;
            gap: 40px;
            font-size: 16px;
            color: rgba(255,255,255,0.9);
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon {
            color: var(--highlight-color);
            font-size: 20px;
        }

        /* Footer Strip */
        .footer-strip {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, var(--accent-color) 0%, var(--highlight-color) 100%);
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- Background Elements -->
        <div class="deco-circle c1"></div>
        <div class="deco-circle c2"></div>
        <div class="deco-line" style="top: 30%;"></div>
        <div class="deco-line" style="bottom: 30%;"></div>

        <div class="content-wrapper">
            <!-- Logos -->
            <div class="logo-container">
                <img src="assets/logo_ndmo.png" class="logo-img" alt="NDMO">
                <div style="width: 2px; height: 40px; background-color: rgba(255,255,255,0.3);"></div>
                <img src="assets/logo_sdaia.png" class="logo-img" alt="SDAIA">
            </div>

            <!-- Main Text -->
            <div class="thank-you-text">شكراً لكم</div>
            <div class="subtitle">نحن ملتزمون بتمكين الجهات من استثمار البيانات كأصل وطني استراتيجي</div>

            <!-- Contact Info -->
            <div class="contact-info">
                <div class="contact-item">
                    <span class="icon">✉</span>
                    <span>info@ndmo.gov.sa</span>
                </div>
                <div class="contact-item">
                    <span class="icon">🌐</span>
                    <span>www.ndmo.gov.sa</span>
                </div>
                <div class="contact-item">
                    <span class="icon">📞</span>
                    <span>199099</span>
                </div>
            </div>
        </div>

        <!-- Footer Strip -->
        <div class="footer-strip"></div>
    </div>
</body>
</html>
